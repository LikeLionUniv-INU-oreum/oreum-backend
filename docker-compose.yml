# ===== app-blue / app-green 공통 설정 =====
x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    mysql:
      condition: service_healthy
  environment:
    MYSQL_DATABASE: ${MYSQL_DATABASE}
    SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
    SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    GOOGLE_SMTP_EMAIL: ${GOOGLE_SMTP_EMAIL}
    GOOGLE_SMTP_APP_PASSWORD: ${GOOGLE_SMTP_APP_PASSWORD}
    JWT_SECRET_KEY: ${JWT_SECRET_KEY}

services:
  mysql:
    image: mysql:8.0
    container_name: orum-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===== Blue 컨테이너: 8081 포트로 실행 =====
  app-blue:
    <<: *app-common
    container_name: orum-app-blue
    ports:
      - "127.0.0.1:8081:8080"

  # ===== Green 컨테이너: 8082 포트로 실행 =====
  app-green:
    <<: *app-common
    container_name: orum-app-green
    ports:
      - "127.0.0.1:8082:8080"

volumes:
  mysql-data: