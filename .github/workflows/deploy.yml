name: Deploy Backend to EC2

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# ===== GitHub Actions 권한 제한 =====
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ===== 저장소 코드 체크아웃 =====
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== Java 실행 환경 설정 =====
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      # ===== 빌드 검증 =====
      # 컴파일 및 빌드 가능 여부만 확인
      # 테스트는 진행 x (DB 의존 테스트로 인한 CI 복잡도를 줄이기 위함)
      - name: Build project
        run: ./gradlew clean build -x test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    # ===== EC2 배포 실행 =====
    # PR 단계에서는 빌드만 확인하고, main push 단계에서만 실제 배포
    if: github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd ${{ secrets.EC2_PROJECT_PATH }}

            # ===== main 브랜치 최신화 =====
            git fetch origin main
            git reset --hard origin/main

            bash ./deploy.sh