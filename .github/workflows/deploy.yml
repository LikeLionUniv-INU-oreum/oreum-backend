name: Deploy Backend to EC2

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# ===== GitHub Actions 권한 제한 =====
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ===== 저장소 코드 체크아웃 =====
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== Java 실행 환경 설정 =====
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ===== Gradle 실행 권한 부여 =====
      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      # ===== 빌드 검증 =====
      # 컴파일 및 빌드 가능 여부 확인
      # 테스트 실행은 제외 (-x test)
      - name: Build project
        run: ./gradlew clean build -x test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    # ===== EC2 배포 실행 조건 =====
    # PR 단계에서는 빌드만 확인하고, main push 시에만 실제 배포
    if: github.event_name == 'push'

    steps:
      # ===== EC2 접속 후 배포 스크립트 실행 =====
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd ${{ secrets.EC2_PROJECT_PATH }}

            # ===== 최신 배포 스크립트 반영 =====
            git fetch origin main
            git reset --hard origin/main

            # ===== Blue-Green 배포 실행 =====
            bash ./deploy.sh